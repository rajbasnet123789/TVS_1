services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: poultry
      POSTGRES_USER: poultry
      POSTGRES_PASSWORD: poultry
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poultry"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: poultry
      DOCKER_INFLUXDB_INIT_BUCKET: detections
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-change-me
      INFLUXDB_HTTP_BIND_ADDRESS: :8086
    ports: ["8086:8086"]
    volumes: [influxdb_data:/var/lib/influxdb2]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports: ["8888:8888", "8554:8554", "1935:1935", "9997:9997"]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://poultry:poultry@postgres:5432/poultry
      REDIS_URL: redis://redis:6379/0
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: dev-token-change-me
      INFLUX_ORG: poultry
      INFLUX_BUCKET: detections
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: poultry-media
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_API_USER: admin
      MEDIAMTX_API_PASS: admin123
      JWT_SECRET: dev-secret-change-in-production-min-32-chars
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: DEBUG
    ports: ["8000:8000"]
    volumes:
      - ./AI_MODEL:/app/AI_MODEL
      - ./backend/app:/app/app
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
      influxdb: {condition: service_started}
      minio: {condition: service_started}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_MEDIAMTX_HLS_BASE: http://localhost:8888
    depends_on: [backend, mediamtx]

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  minio_data:
