services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_DB: poultry
      POSTGRES_USER: poultry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5433:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poultry"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7.10
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: poultry
      DOCKER_INFLUXDB_INIT_BUCKET: detections
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
      INFLUXDB_HTTP_BIND_ADDRESS: :8086
    ports: ["8086:8086"]
    volumes: [influxdb_data:/var/lib/influxdb2]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2.0.20
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable-tensorrt
    shm_size: "256mb"
    ports:
      - "8971:8971"
      - "1984:1984"
      - "8555:8555/udp"
    volumes:
      - ./frigate/config:/config
      - frigate_storage:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    runtime: nvidia
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://poultry:${POSTGRES_PASSWORD}@postgres:5432/poultry
      REDIS_URL: redis://redis:6379/0
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: poultry
      INFLUX_BUCKET: detections
      MEDIA_ROOT: /var/opt/poultry/media
      FRIGATE_API_URL: http://frigate:5000
      FRIGATE_GO2RTC_URL: http://frigate:1984
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DB_ECHO: ${DB_ECHO:-false}
      COOKIES_SECURE: ${COOKIES_SECURE:-false}
      CAMERA_PROCESS_INTERVAL: ${CAMERA_PROCESS_INTERVAL:-3}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    ports: ["8000:8000"]
    volumes:
      - ./backend/app:/app/app
      - poultry_media:/var/opt/poultry/media
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      influxdb: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on: [frontend]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports: ["3000:80"]
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_FRIGATE_GO2RTC_URL: ${VITE_FRIGATE_GO2RTC_URL:-http://localhost:1984}
    depends_on: [backend]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    environment:
      PG_USER: ${POSTGRES_USER:-poultry}
      PG_HOST: postgres
      PG_DB: ${POSTGRES_DB:-poultry}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      INFLUX_HOST: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-poultry}
      BACKUP_DIR: /var/opt/poultry/backups
      MEDIA_BACKUP_DIR: /var/opt/poultry/media
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    volumes:
      - poultry_backups:/var/opt/poultry/backups
      - poultry_media:/var/opt/poultry/media:ro
    depends_on:
      postgres: {condition: service_healthy}
      influxdb: {condition: service_healthy}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  mosquitto_data:
  frigate_storage:
  caddy_data:
  poultry_media:
  poultry_backups:
